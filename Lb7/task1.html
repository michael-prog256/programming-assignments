<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Блокові та inline елементи</title>

    <style>

        div{
            border:2px solid blue;
            background-color:lightblue;
            margin:10px;
            padding:10px;
        }

        span{
            color:red;
            background-color:yellow;
            text-decoration:underline;
        }

        a{
            color:green;
            background-color:#eeeeee;
        }

        strong{
            color:darkred;
            background-color:pink;
        }

    </style>

</head>
<body>

<h1>Демонстрація блокових та inline елементів</h1>

<div>Це блоковий елемент DIV</div>
<div>Ще один блоковий елемент DIV</div>
<div>Третій блоковий елемент DIV</div>

<p>
    У цьому параграфі є
    <span>inline елемент SPAN</span>,
    <a href="#">посилання</a>
    та
    <strong>важливий текст</strong>.
</p>

<p>
    Це другий параграф.
    <span>Ще один SPAN</span>,
    <a href="#">ще одне посилання</a>
    та
    <strong>жирний текст</strong>.
</p>

</body>
</html>
